services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    env_file: .env
    environment:
      # Override DB_HOST so the app connects to the postgres container
      DB_HOST: postgres
      RELEASES_DIR: /releases
    ports:
      - "${PORT:-8888}:8888"
    volumes:
      - ${RELEASES_DIR}:/releases:ro
      - ./lampa-plugins:/app/lampa-plugins:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
